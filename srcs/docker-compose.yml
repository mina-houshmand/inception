services:
  db:
    build: ./requirements/mariadb
    container_name: db
    restart: always
    volumes:
      - /home/mina/data/mariadb:/var/lib/mysql
    env_file:
      - .env
    networks:
      - inception_net

  site:
    build: ./requirements/wordpress
    container_name: site
    restart: always
    volumes:
      - /home/mina/data/wordpress:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - inception_net

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    restart: always
    volumes:
      - /home/mina/data/wordpress:/var/www/html
    depends_on:
      - site
    networks:
      - inception_net

networks:
  inception_net:
    driver: bridge
