services:
  db:
    build: ./requirements/mariadb
    image: db
    container_name: db
    restart: always
    volumes:
      - mariadb:/var/lib/mysql
    env_file:
      - .env
    networks:
      - inception_net

  site:
    build: ./requirements/wordpress
    image: site
    container_name: site
    restart: always
    volumes:
      - wordpress:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - inception_net

  # nginx is intentionally isolated in its own container; this service is 
  # WordPress/PHP-FPM only.
  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    ports:
      - "443:443"
    restart: always
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - site
    networks:
      - inception_net

networks:
  inception_net:
    driver: bridge

volumes:
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mhoushma/data/wordpress
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mhoushma/data/mariadb

# named volumes are backed by the local driver with host paths under /home/mhoushma/data